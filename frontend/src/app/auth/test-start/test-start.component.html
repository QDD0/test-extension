<div class="test-layout">
  <div class="container">
    <h2 class="test-title">Тест</h2>

    <div *ngFor="let question of questions; let i = index; trackBy: trackByQuestion" class="question-block">
      <p class="question-text">
        <b>Вопрос {{ i + 1 }}:</b> {{ question.question_text }}
      </p>

      <div *ngIf="question.type_question === 'SINGLE'" class="answers-container">
        <div *ngFor="let answer of question.answers; trackBy: trackByAnswer" class="answer-option">
          <label>
            <input type="radio"
                   [name]="'question_' + question.id_question"
                   [value]="answer.id_answer"
                   [checked]="userAnswers[question.id_question] === answer.id_answer"
                   (change)="setSingleAnswer(question.id_question, answer.id_answer)">
            {{ answer.answer_text }}
          </label>
        </div>
      </div>

      <div *ngIf="question.type_question === 'MULTIPLE'" class="answers-container">
        <div *ngFor="let answer of question.answers; trackBy: trackByAnswer" class="answer-option">
          <label>
            <input type="checkbox"
                   [checked]="userAnswers[question.id_question]?.includes(answer.id_answer)"
                   (change)="toggleMultiple(question.id_question, answer.id_answer, $event)">
            {{ answer.answer_text }}
          </label>
        </div>
      </div>

      <div *ngIf="question.type_question === 'TEXT'" class="text-answer-container">
        <textarea
          [id]="'text_' + question.id_question"
          (input)="setTextAnswer(question.id_question, $event)"
          placeholder="Введите ваш ответ..."
          rows="4"
          class="form-control"
        >{{ userAnswers[question.id_question] || '' }}</textarea>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="timer">
      ⏱ Осталось: <b>{{ formattedTime }}</b>
    </div>

    <div class="question-count">
      Вопросов: {{ questions.length }}
    </div>

    <button class="submit-btn" (click)="finishTest()">
      Завершить тест
    </button>

    <a href="/tests-page" class="exit-btn">
      Выйти
    </a>
  </div>
</div>
