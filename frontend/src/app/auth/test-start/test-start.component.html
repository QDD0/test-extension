<div class="container">
  <h2 class="test-title">Тест</h2>
  <div class="timer" [style.color]="remainingTime < 60 ? 'red' : 'black'">
    Осталось времени: <b>{{ formattedTime }}</b>
  </div>
  <a href="/tests-page" class="back-link">Вернуться назад</a>
  <hr class="divider">

  <div *ngFor="let q of questions; let i = index" class="question-block">
    <p class="question-text">
      <b>Вопрос {{ i + 1 }}:</b> {{ q.question_text }}
    </p>

    <div *ngIf="q.type_question === 'SINGLE'" class="answers-container single-choice">
      <div *ngFor="let a of q.answers" class="answer-option">
        <label class="answer-label">
          <input type="radio"
                 [name]="'question' + q.id_question"
                 (change)="userAnswers[q.id_question] = a.id_answer"
                 class="radio-input">
          <span class="answer-text">{{ a.answer_text }}</span>
        </label>
      </div>
    </div>

    <div *ngIf="q.type_question === 'MULTIPLE'" class="answers-container multiple-choice">
      <div *ngFor="let a of q.answers" class="answer-option">
        <label class="answer-label">
          <input type="checkbox"
                 class="checkbox-input"
                 (change)="toggleMultiple(q.id_question, a.id_answer, $event)">
        </label>
        <span class="answer-text">{{ a.answer_text }}</span>
      </div>
    </div>

    <div *ngIf="q.type_question === 'TEXT'" class="answers-container text-answer">
      <input type="text"
             class="text-input"
             placeholder="Введите ответ"
             (input)="userAnswers[q.id_question] = $any($event.target).value">
    </div>
  </div>

  <button class="submit-btn" (click)="finishTest()">
    Завершить тест
  </button>
</div>
