<div class="forgot-password-container">
  <h2>Восстановление пароля</h2>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="requestReset()">
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        formControlName="email"
        class="form-control"
        placeholder="Введите ваш email">

      <!-- Показываем ошибки валидации -->
      <div *ngIf="email?.invalid && email?.touched" class="validation-error">
        <span *ngIf="email?.errors?.['required']">Email обязателен</span>
        <span *ngIf="email?.errors?.['email']">Введите корректный email</span>
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="resetForm.invalid">
      Продолжить
    </button>
  </form>

  <div class="back-link">
    <a routerLink="/login">Вернуться к входу</a>
  </div>
</div>
