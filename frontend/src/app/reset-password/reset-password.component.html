<div class="reset-password-container">
  <h2>Сброс пароля</h2>

  <div *ngIf="email && !successMessage" class="email-info">
    <p>Сброс пароля для: <strong>{{ email }}</strong></p>
  </div>

  <div *ngIf="errorMessage" class="alert alert-error">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" *ngIf="!successMessage && token">
    <div class="form-group">
      <label for="newPassword">Новый пароль</label>
      <input
        id="newPassword"
        type="password"
        formControlName="newPassword"
        class="form-control"
        placeholder="Минимум 6 символов">

      <div *ngIf="newPassword?.invalid && (newPassword?.dirty || newPassword?.touched)" class="validation-error">
        <span *ngIf="newPassword?.errors?.['required']">Пароль обязателен</span>
        <span *ngIf="newPassword?.errors?.['minlength']">Пароль должен содержать минимум 6 символов</span>
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Подтвердите пароль</label>
      <input
        id="confirmPassword"
        type="password"
        formControlName="confirmPassword"
        class="form-control"
        placeholder="Повторите пароль">

      <div *ngIf="confirmPassword?.invalid && (confirmPassword?.dirty || confirmPassword?.touched)" class="validation-error">
        <span *ngIf="confirmPassword?.errors?.['required']">Подтверждение пароля обязательно</span>
      </div>

      <div *ngIf="resetForm.value.newPassword !== resetForm.value.confirmPassword &&
                  confirmPassword?.dirty && resetForm.value.confirmPassword"
           class="validation-error">
        <span>Пароли не совпадают</span>
      </div>
    </div>

    <button
      type="submit"
      class="btn btn-primary"
      [disabled]="resetForm.invalid || isSubmitting ||
                  resetForm.value.newPassword !== resetForm.value.confirmPassword">
      {{ isSubmitting ? 'Сохранение...' : 'Сменить пароль' }}
    </button>
  </form>

  <div class="back-link">
    <a routerLink="/login">← Вернуться к входу</a>
  </div>
</div>
